name: CI

# Pull requests and feature-branch pushes are validated here. Pushes to `main`
# are handled by deploy.yml, which runs the same checks before shipping, so we
# skip `main` here to avoid running the suite twice.
on:
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/ci.yml"
  push:
    branches-ignore: [main]
    paths:
      - "backend/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: backend

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Build
        run: go build -v -o bin/server ./cmd/server
