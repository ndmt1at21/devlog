name: Deploy frontend

# Continuous deployment: every push to main that touches the frontend is
# typechecked, linted, built with OpenNext, and deployed to Cloudflare Workers.
#
# All production configuration lives in GitHub (PROD environment secrets):
#   CLOUDFLARE_API_TOKEN   Workers Scripts:Edit token (wrangler auth)
#   CLOUDFLARE_ACCOUNT_ID  Cloudflare account id
#   BACKEND_INTERNAL_URL   public HTTPS origin of the Go backend
#   NEXT_PUBLIC_SITE_URL   public origin of the site (canonical/OG/sitemap)
#   NEXT_PUBLIC_*          optional feature config (GA, ads, pro/donate flags);
#                          unset secrets resolve to "" = feature disabled/default
#
# NEXT_PUBLIC_* and BACKEND_INTERNAL_URL are BUILD-TIME values, inlined into
# the bundle here. The runtime twin of BACKEND_INTERNAL_URL (read per-request
# by src/lib/server-api.ts) comes from wrangler.jsonc `vars` — keep that file's
# committed value identical to the secret.
on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch: {}

# Never let two deploys race on the Worker.
concurrency:
  group: deploy-frontend
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    working-directory: frontend

jobs:
  deploy:
    name: Build & deploy to Cloudflare
    runs-on: ubuntu-latest
    # Secrets live under the `PROD` environment, so the job must opt into it.
    environment: PROD
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      # A deploy with this secret empty bakes a localhost /api rewrite into the
      # Worker and every /api/* request 500s in production — fail loudly instead.
      - name: Require BACKEND_INTERNAL_URL
        env:
          BACKEND_INTERNAL_URL: ${{ secrets.BACKEND_INTERNAL_URL }}
        run: |
          if [ -z "$BACKEND_INTERNAL_URL" ]; then
            echo "::error::PROD secret BACKEND_INTERNAL_URL is empty. Set it to the backend origin (e.g. https://api.jamti.dev) in Settings → Environments → PROD, then re-run."
            exit 1
          fi

      - name: Build & deploy
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BACKEND_INTERNAL_URL: ${{ secrets.BACKEND_INTERNAL_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
          NEXT_PUBLIC_GAM_NETWORK_CODE: ${{ secrets.NEXT_PUBLIC_GAM_NETWORK_CODE }}
          NEXT_PUBLIC_GAM_AD_UNIT: ${{ secrets.NEXT_PUBLIC_GAM_AD_UNIT }}
          NEXT_PUBLIC_PRO_ENABLED: ${{ secrets.NEXT_PUBLIC_PRO_ENABLED }}
          NEXT_PUBLIC_DONATE_ENABLED: ${{ secrets.NEXT_PUBLIC_DONATE_ENABLED }}
          NEXT_PUBLIC_PAYPAL_DONATE_URL: ${{ secrets.NEXT_PUBLIC_PAYPAL_DONATE_URL }}
          NEXT_PUBLIC_MOMO_QR_URL: ${{ secrets.NEXT_PUBLIC_MOMO_QR_URL }}
          NEXT_PUBLIC_MOMO_DONATE_URL: ${{ secrets.NEXT_PUBLIC_MOMO_DONATE_URL }}
